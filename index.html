<script>
document.addEventListener("mousemove", (event) => {
    const elements = document.querySelectorAll(".move");

    elements.forEach(el => {
        const rect = el.getBoundingClientRect();

        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const deltaX = centerX - event.clientX;
        const deltaY = centerY - event.clientY;

        const translateX = deltaX / 40 * -1
        const translateY = deltaY / 40 * -1
        const rotate = deltaX / 80 * -1

        el.style.transition = "transform 0.1s";
        el.style.transform = `translate(${translateX}px, ${translateY}px) rotate(${rotate}deg)`;
    });
});
</script>
